services:
  db:
    image: pgvector/pgvector:pg16
    container_name: cognitive_sdlc_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: cognitive_sdlc
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cognitive_sdlc_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: cognitive_sdlc_worker
    volumes:
      - ./backend:/app
      - ./docs:/docs:ro
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/cognitive_sdlc
      - REDIS_URL=redis://redis:6379/0
      - DOCS_PATH=/docs
    depends_on:
      - db
      - redis
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cognitive_sdlc_backend
    volumes:
      - ./backend:/app
      - ./docs:/docs:ro
    ports:
      - "4022:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/cognitive_sdlc
      - REDIS_URL=redis://redis:6379/0
      - DOCS_PATH=/docs
    depends_on:
      - db
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cognitive_sdlc_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "4021:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4022
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
